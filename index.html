<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>PhotoMosaic Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00d9ff; --red: #e60026; --yellow: #ffff66; --black: #0a0a0a;
            --white: #ffffff; --dark-gray: #1a1a2e; --green: #10b981; --purple: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body {
            font-family: 'VT323', monospace; background: var(--black); color: var(--white);
            min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column;
        }

        /* Header */
        .game-header {
            background: var(--cyan); color: var(--black); padding: 12px 16px;
            border-bottom: 4px solid var(--white); position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
        }
        .game-header h1 { font-family: 'Press Start 2P', cursive; font-size: clamp(0.7rem, 3.5vw, 1rem); }

        /* Panels & Layout */
        .game-container { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 16px; max-width: 800px; margin: 0 auto; width: 100%; }
        .panel { background: var(--dark-gray); border: 4px solid var(--white); padding: 16px; position: relative; }
        .panel-cyan { border-color: var(--cyan); }
        .panel-red { border-color: var(--red); }
        .panel-title { font-family: 'Press Start 2P', cursive; font-size: 0.7rem; color: var(--yellow); margin-bottom: 16px; }

        /* Drop Zones */
        .drop-zone {
            border: 4px dashed var(--cyan); background: rgba(0, 217, 255, 0.1);
            padding: 32px 16px; text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .drop-zone:active { background: rgba(0, 217, 255, 0.3); }

        /* Buttons */
        .btn {
            font-family: 'Press Start 2P', cursive; font-size: 0.65rem; padding: 16px;
            border: none; cursor: pointer; text-transform: uppercase; width: 100%; margin: 8px 0;
            transition: transform 0.1s;
        }
        .btn:active { transform: translateY(4px); }
        .btn-cyan { background: var(--cyan); color: var(--black); box-shadow: 0 6px 0 #0099bb; }
        .btn-green { background: var(--green); color: var(--white); box-shadow: 0 6px 0 #059669; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Canvas Display */
        .canvas-panel {
            background: #000; border: 4px solid var(--red); min-height: 300px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #mainCanvas { max-width: 100%; height: auto; image-rendering: pixelated; }

        /* Progress Overlay */
        .progress-overlay {
            position: fixed; inset: 0; background: rgba(10, 10, 10, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .progress-bar-wrap { width: 80%; height: 32px; background: #000; border: 2px solid #fff; }
        .progress-bar-fill { height: 100%; background: var(--cyan); width: 0%; transition: width 0.2s; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="game-header">
        <button class="btn" style="width: auto; padding: 8px 12px;" onclick="location.reload()">RESET</button>
        <h1>PHOTOMOSAIC PRO</h1>
        <div></div>
    </header>

    <div class="game-container">
        <div class="panel panel-cyan">
            <div class="panel-title">1. TILE LIBRARY</div>
            <div class="drop-zone" onclick="document.getElementById('tileFiles').click()">
                <p id="tileStatus">TAP TO UPLOAD SOURCE TILES</p>
                <div id="tileStats" class="hidden" style="color: var(--yellow); margin-top: 10px;">0 TILES READY</div>
            </div>
            <input type="file" id="tileFiles" multiple accept="image/*" class="hidden">
            
            <div style="margin-top: 15px;">
                <p style="font-size: 0.8rem; margin-bottom: 5px;">OR USE CLOUD LIBRARIES:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button class="btn btn-cyan btn-small" onclick="app.loadCloud('nasa')">NASA</button>
                    <button class="btn btn-cyan btn-small" onclick="app.loadCloud('met')">THE MET</button>
                </div>
            </div>
        </div>

        <div class="panel panel-red">
            <div class="panel-title">2. TARGET IMAGE</div>
            <div class="drop-zone" onclick="document.getElementById('targetFile').click()">
                <p id="targetStatus">SELECT MAIN PHOTO</p>
                <img id="targetPreview" class="hidden" style="width: 100%; margin-top: 10px; border: 2px solid white;">
            </div>
            <input type="file" id="targetFile" accept="image/*" class="hidden">
        </div>

        <div class="panel">
            <div class="panel-title">3. CONTROL CENTER</div>
            <button id="generateBtn" class="btn btn-green">🚀 START MOSAIC ENGINE</button>
            <button id="downloadBtn" class="btn btn-cyan hidden">💾 SAVE TO DEVICE</button>
        </div>

        <div class="canvas-panel">
            <canvas id="mainCanvas"></canvas>
        </div>
    </div>

    <div id="progressOverlay" class="progress-overlay">
        <div class="panel-title">ANALYZING PIXELS...</div>
        <div class="progress-bar-wrap"><div id="progressFill" class="progress-bar-fill"></div></div>
        <p id="statusMsg" style="margin-top: 15px; color: var(--cyan);">PRE-PROCESSING TILES</p>
    </div>

    <script>
        // --- WEB WORKER ENGINE ---
        const workerCode = `
            self.onmessage = function(e) {
                const { targetData, tileAverages, tileWidth, tileHeight } = e.data;
                const rows = Math.floor(targetData.height / tileHeight);
                const cols = Math.floor(targetData.width / tileWidth);
                const results = [];

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const x = c * tileWidth;
                        const y = r * tileHeight;
                        
                        let rSum = 0, gSum = 0, bSum = 0, count = 0;
                        for (let ty = 0; ty < tileHeight; ty++) {
                            for (let tx = 0; tx < tileWidth; tx++) {
                                const idx = ((y + ty) * targetData.width + (x + tx)) * 4;
                                rSum += targetData.data[idx];
                                gSum += targetData.data[idx+1];
                                bSum += targetData.data[idx+2];
                                count++;
                            }
                        }
                        
                        const avg = { r: rSum/count, g: gSum/count, b: bSum/count };
                        let bestIdx = 0, minDiff = Infinity;

                        tileAverages.forEach((tAvg, i) => {
                            const d = Math.sqrt((tAvg.r-avg.r)**2 + (tAvg.g-avg.g)**2 + (tAvg.b-avg.b)**2);
                            if (d < minDiff) { minDiff = d; bestIdx = i; }
                        });

                        results.push({ x, y, bestIdx });
                    }
                    if (r % 10 === 0) self.postMessage({ progress: (r/rows)*100 });
                }
                self.postMessage({ complete: true, mosaic: results });
            };
        `;

        // --- APP LOGIC ---
        const app = {
            tiles: [],
            target: null,
            worker: null,

            init() {
                const blob = new Blob([workerCode], { type: 'application/javascript' });
                this.worker = new Worker(URL.createObjectURL(blob));
                this.worker.onmessage = (e) => this.handleWorkerMsg(e.data);

                document.getElementById('tileFiles').onchange = (e) => this.loadLocalTiles(e.target.files);
                document.getElementById('targetFile').onchange = (e) => this.loadTarget(e.target.files[0]);
                document.getElementById('generateBtn').onclick = () => this.generate();
            },

            async loadLocalTiles(files) {
                document.getElementById('tileStatus').innerText = "PROCESSING TILES...";
                this.tiles = await Promise.all(Array.from(files).map(f => this.processImage(f)));
                this.updateUI();
            },

            loadTarget(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.target = new Image();
                    this.target.onload = () => {
                        const preview = document.getElementById('targetPreview');
                        preview.src = this.target.src;
                        preview.classList.remove('hidden');
                        document.getElementById('targetStatus').classList.add('hidden');
                    };
                    this.target.src = e.target.result;
                };
                reader.readAsDataURL(file);
            },

            processImage(fileOrUrl) {
                return new Promise(resolve => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 20; canvas.height = 20;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 20, 20);
                        const data = ctx.getImageData(0,0,20,20).data;
                        let r=0, g=0, b=0;
                        for(let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
                        resolve({ img, avg: { r: r/400, g: g/400, b: b/400 } });
                    };
                    img.src = typeof fileOrUrl === 'string' ? fileOrUrl : URL.createObjectURL(fileOrUrl);
                });
            },

            updateUI() {
                const stats = document.getElementById('tileStats');
                stats.classList.remove('hidden');
                stats.innerText = `${this.tiles.length} TILES LOADED`;
                document.getElementById('tileStatus').innerText = "TILES READY!";
            },

            generate() {
                if (!this.target || this.tiles.length === 0) return alert("Upload tiles and target first!");
                
                document.getElementById('progressOverlay').style.display = 'flex';
                const canvas = document.getElementById('mainCanvas');
                canvas.width = this.target.width;
                canvas.height = this.target.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(this.target, 0, 0);

                this.worker.postMessage({
                    targetData: ctx.getImageData(0, 0, canvas.width, canvas.height),
                    tileAverages: this.tiles.map(t => t.avg),
                    tileWidth: 20,
                    tileHeight: 20
                });
            },

            handleWorkerMsg(data) {
                if (data.progress) {
                    document.getElementById('progressFill').style.width = data.progress + '%';
                }
                if (data.complete) {
                    const canvas = document.getElementById('mainCanvas');
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0,0, canvas.width, canvas.height);
                    data.mosaic.forEach(m => {
                        ctx.drawImage(this.tiles[m.bestIdx].img, m.x, m.y, 20, 20);
                    });
                    document.getElementById('progressOverlay').style.display = 'none';
                    document.getElementById('downloadBtn').classList.remove('hidden');
                }
            },

            loadCloud(source) {
                alert(`Loading ${source.toUpperCase()} library... (Mock integration active)`);
                // Placeholder for Cloud API calls from fixed file
            }
        };

        app.init();
    </script>
</body>
</html>
